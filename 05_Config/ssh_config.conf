# ------------------------------------------------------------------
# Hardening de SSH - Directivas de Seguridad Aplicadas
# ------------------------------------------------------------------

# Deshabilitar el acceso directo como root 
PermitRootLogin no

# Limitar intentos de acceso para mitigar fuerza bruta 
MaxAuthTries 3

# Tiempo máximo para completar la autenticación 
LoginGraceTime 30

# Restricción de acceso: Solo el administrador tiene permiso SSH 
AllowUsers adminclima